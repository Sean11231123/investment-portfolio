name: Update Market Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  contents: write

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Taiwan prices
        run: python scripts/update_tw_prices.py

      - name: Commit market data if changed
        run: |
          if git diff --quiet -- public/data/market/tw-prices.json; then
            echo "No Taiwan market data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/market/tw-prices.json
          git commit -m "Update Taiwan market price data"
          git pull --rebase origin main
          git push origin HEAD:main
