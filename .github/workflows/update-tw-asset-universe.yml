name: Update Taiwan Asset Universe

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * 1-5"

permissions:
  contents: write

jobs:
  update-tw-asset-universe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update Taiwan asset universe
        run: python scripts/update_tw_asset_universe.py

      - name: Commit changed Taiwan asset universe
        run: |
          if git diff --quiet -- public/data/universe/tw-assets.json; then
            echo "No Taiwan asset universe changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/universe/tw-assets.json
          git commit -m "Update Taiwan asset universe"
          git pull --rebase origin main
          git push origin HEAD:main
