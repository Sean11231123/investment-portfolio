name: Update US Market Data

on:
  workflow_dispatch:
  schedule:
    # 22:30 UTC is after the regular US market close for both EST and EDT.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

jobs:
  update-us-market-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update US market prices
        run: python scripts/update_us_prices.py

      - name: Commit changed US market data
        run: |
          if git diff --quiet -- public/data/market/us-prices.json; then
            echo "No US market data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/market/us-prices.json
          git commit -m "Update US market price data"
          git push
