name: Update US Asset Universe

on:
  workflow_dispatch:
  schedule:
    - cron: "45 9 * * 1-5"

permissions:
  contents: write

jobs:
  update-us-asset-universe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update US asset universe
        run: python scripts/update_us_asset_universe.py

      - name: Commit changed US asset universe
        run: |
          if git diff --quiet -- public/data/universe/us-assets.json; then
            echo "No US asset universe changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/universe/us-assets.json
          git commit -m "Update US asset universe"
          git pull --rebase origin main
          git push origin HEAD:main
