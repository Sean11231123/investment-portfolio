name: Update US ETF Components

on:
  workflow_dispatch:
  schedule:
    # 23:00 UTC is after the regular US market close for both EST and EDT.
    - cron: "0 23 * * 1-5"

permissions:
  contents: write

jobs:
  update-us-etf-components:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Update US ETF components
        run: python scripts/update_us_etf_components.py

      - name: Validate ETF component data
        run: npm run validate:etf-components

      - name: Commit changed US ETF component data
        run: |
          if git diff --quiet -- public/data/etf-components; then
            echo "No US ETF component changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/etf-components
          git commit -m "Update US ETF component data"
          git push
